  <path d="M50 50 L50 6 A44 44 0 0 1 81.1 18.9 Z" fill="#E8923A"/>
  <!-- Segment 2: top-right‚Üíright ‚Äî olive/yellow -->
  <path d="M50 50 L81.1 18.9 A44 44 0 0 1 94 50 Z" fill="#C4A832"/>
  <!-- Segment 3: right‚Üíbottom-right ‚Äî yellow-green -->
  <path d="M50 50 L94 50 A44 44 0 0 1 81.1 81.1 Z" fill="#C8D96B"/>
  <!-- Segment 4: bottom-right‚Üíbottom ‚Äî green -->
  <path d="M50 50 L81.1 81.1 A44 44 0 0 1 50 94 Z" fill="#6BAF6E"/>
  <!-- Segment 5: bottom‚Üíbottom-left ‚Äî teal -->
  <path d="M50 50 L50 94 A44 44 0 0 1 18.9 81.1 Z" fill="#4A9BA8"/>
