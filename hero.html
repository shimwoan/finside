<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINSIDE — Find the Inside Value</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --accent: #c8f0e8;   /* soft mint-white — scientific, not neon */
    --accent2: #7ee8c8;  /* brighter mint for highlights */
    --bg: #0e0e0e;       /* near-black, warm */
    --text: #e8e4dc;     /* creamy ivory */
    --text-dim: #e8e4dc55;
  }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Inter', 'Apple SD Gothic Neo', sans-serif;
    overflow-x: hidden;
  }

  /* ── Radial glow behind molecule scene (like the coffee roaster bg) ── */
  #hero::before {
    content: '';
    position: absolute;
    right: max(5%, calc((100vw - 1800px) / 2)); top: 50%;
    transform: translateY(-50%);
    width: min(55vw, 990px); height: 80vh;
    background: radial-gradient(ellipse at center,
      #1a3d2e55 0%,
      #0d2a2055 35%,
      transparent 70%
    );
    pointer-events: none;
    z-index: 0;
  }
  /* secondary subtle glow top-right corner */
  #hero::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 35vw; height: 45vh;
    background: radial-gradient(ellipse at top right,
      #0f2d2222 0%,
      transparent 65%
    );
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 28px clamp(56px, 5vw, 120px);
    pointer-events: none;
  }
  nav * { pointer-events: auto; }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a {
    color: var(--text-dim); text-decoration: none;
    font-size: 12px; letter-spacing: 0.1em; font-weight: 400;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }

  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  #scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  #hero-inner {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 1800px;
    margin: 0 auto;
    display: flex;
    align-items: center;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    width: 52%;
    padding: 76px 0 0 clamp(40px, 8vw, 160px);
  }

  .hero-label {
    font-size: 10px; letter-spacing: 0.45em;
    color: var(--accent2); margin-bottom: 28px;
    font-weight: 500; opacity: 0.7;
    text-transform: uppercase;
  }

  .hero-title {
    font-size: clamp(28px, 3.6vw, 72px);
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: 0;
    color: var(--text);
  }
  /* accent word — slightly brighter ivory, not a different hue */
  .hero-title .accent {
    color: #ffffff;
  }

  .hero-divider {
    width: 40px; height: 1px;
    background: var(--accent2);
    opacity: 0.4;
    margin: 32px 0;
  }

  .hero-sub {
    font-size: clamp(14px, 1.1vw, 24px);
    color: #e8e4dcbf;
    line-height: 1.8;
    max-width: clamp(320px, 28vw, 520px);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .hero-cta { display: flex; gap: 16px; margin-top: 44px; align-items: center; }

  .btn-primary {
    background: transparent;
    color: var(--text);
    font-size: 12px; font-weight: 500; letter-spacing: 0.15em;
    padding: 13px 30px;
    border-radius: 2px;
    border: 1px solid #e8e4dc40;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    text-transform: uppercase;
  }
  .btn-primary:hover {
    background: #e8e4dc0d;
    border-color: #e8e4dc80;
  }

  .btn-ghost {
    color: var(--accent2);
    font-size: 12px; letter-spacing: 0.12em; font-weight: 400;
    cursor: pointer; border: none; background: none;
    display: flex; align-items: center; gap: 10px;
    transition: opacity 0.2s;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .btn-ghost:hover { opacity: 1; }
  .btn-ghost::after { content: '↗'; font-size: 14px; }

  /* stat strip */
  .hero-stats {
    display: flex; gap: clamp(28px, 3vw, 56px); margin-top: clamp(40px, 4vw, 72px);
    padding-top: 32px;
    border-top: 1px solid #e8e4dc10;
  }
  .stat-num {
    font-size: clamp(18px, 1.5vw, 36px); font-weight: 700;
    color: var(--text); letter-spacing: -0.02em;
  }
  .stat-num span { color: var(--accent2); font-size: 0.65em; }
  .stat-label {
    font-size: 12px; color: var(--text-dim);
    letter-spacing: 0.12em; margin-top: 4px;
    text-transform: uppercase;
  }

  .scroll-hint {
    position: absolute; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    opacity: 0.4;
  }
  .scroll-hint span {
    font-size: 9px; letter-spacing: 0.35em;
    color: var(--text); text-transform: uppercase;
  }
  .scroll-arrow {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--text), transparent);
    animation: scrollBounce 2.5s ease-in-out infinite;
  }
  @keyframes scrollBounce {
    0%, 100% { opacity: 0.3; transform: scaleY(0.6); transform-origin: top; }
    50%       { opacity: 1;   transform: scaleY(1);   transform-origin: top; }
  }

  /* ── Text reveal animation ── */
  /* Each animated block starts invisible; JS adds .revealed */
  .reveal-block {
    overflow: hidden;        /* clips the child sliding up */
  }
  .reveal-inner {
    display: block;
    transform: translateY(100%);
    opacity: 0;
    transition:
      transform 0.9s cubic-bezier(0.16, 1, 0.3, 1),
      opacity   0.9s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .reveal-block.revealed .reveal-inner {
    transform: translateY(0);
    opacity: 1;
  }

  /* label acts as logo — fixed to nav row on the left */
  .hero-label {
    position: fixed;
    top: 0; left: clamp(56px, 5vw, 120px);
    z-index: 101;
    display: flex;
    align-items: center;
    height: 76px; /* matches nav padding: 28px top + ~20px text + 28px bottom */
    font-size: 10px; letter-spacing: 0.45em;
    color: var(--accent2);
    font-weight: 500; text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    transition:
      opacity   0.7s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    /* remove the margin-bottom from hero-content flow */
    margin-bottom: 0;
  }
  .hero-label.revealed { opacity: 0.75; transform: translateY(0); }

  /* divider grows from left */
  .hero-divider {
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .hero-divider.revealed { transform: scaleX(1); }

  /* sub, cta, stats: fade + rise */
  .hero-sub, .hero-cta, .hero-stats {
    opacity: 0;
    transform: translateY(18px);
    transition:
      opacity   0.8s cubic-bezier(0.16, 1, 0.3, 1),
      transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .hero-sub.revealed,
  .hero-cta.revealed,
  .hero-stats.revealed {
    opacity: 1;
    transform: translateY(0);
  }

  /* stat numbers count up — handled in JS */
  .stat-num { font-variant-numeric: tabular-nums; }

  .stat-industries {
    font-size: clamp(18px, 1.5vw, 36px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.4;
  }

</style>
</head>
<body>

<nav>
  <ul class="nav-links">
    <li><a href="#">Technology</a></li>
    <li><a href="#">Product</a></li>
    <li><a href="#">Market</a></li>
    <li><a href="#">Company</a></li>
    <li><a href="#">IR</a></li>
  </ul>
</nav>

<section id="hero">
  <canvas id="scene"></canvas>

  <div id="hero-inner">
  <div class="hero-content">
    <div class="hero-label">FinSide</div>
    <h1 class="hero-title">
      <div class="reveal-block"><span class="reveal-inner">보이지 않는</span></div>
      <div class="reveal-block"><span class="reveal-inner"><span class="accent">내부의 가치</span>를</span></div>
      <div class="reveal-block"><span class="reveal-inner">발견합니다</span></div>
    </h1>
    <div class="hero-divider"></div>
    <p class="hero-sub">
      AI 비접촉 내부 분석 기술로<br>
      보이지 않는 데이터를 정량화하여<br>
      산업의 새 기준을 만듭니다
    </p>
    <div class="hero-cta">
      <button class="btn-primary">솔루션 알아보기</button>
      <button class="btn-ghost">IR 자료 보기</button>
    </div>
    <div class="hero-stats">
      <div class="stat-item">
        <div class="stat-industries">뷰티 · 농산물·소재 선별</div>
        <div class="stat-label">산업 적용 분야</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" data-target="98" data-suffix="%">0%</div>
        <div class="stat-label">분석 정확도</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" data-target="0" data-suffix="ms">0ms</div>
        <div class="stat-label">접촉 없는 측정</div>
      </div>
    </div>
  </div>
  </div>

  <div class="scroll-hint">
    <span>Scroll</span>
    <div class="scroll-arrow"></div>
  </div>
</section>

<script>
// ─────────────────────────────────────────────────────────
//  Pure 2D Canvas — single pipeline, zero handoff
//
//  Phase 1  GATHER   particles fly edge → node positions
//  Phase 2  CONDENSE particles shrink/merge into spheres
//  Phase 3  LIVE     spheres float + rotate + mouse react
// ─────────────────────────────────────────────────────────

const canvas = document.getElementById('scene');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  W = canvas.width  = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
const ro = new ResizeObserver(resize);
ro.observe(canvas);
resize();

// ── Easing helpers ──────────────────────────────────────
const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - (-2*t+2)**3/2;
const easeOutExpo    = t => t >= 1 ? 1 : 1 - 2**(-10*t);
const easeOutCubic   = t => 1 - (1-t)**3;
const lerp           = (a, b, t) => a + (b-a)*t;

// ── Mouse ────────────────────────────────────────────────
const mouse = { nx: 0, ny: 0, sx: 0, sy: 0 }; // normalised & smoothed
window.addEventListener('mousemove', e => {
  mouse.nx = (e.clientX / W) * 2 - 1;
  mouse.ny = (e.clientY / H) * 2 - 1;
});

// ── Molecule blueprint (right-half layout) ───────────────
// Positions are offsets from each molecule's anchor, in px-scale units
// Anchors are expressed as fraction of (W, H)
function getMolecules() {
  // center molecule within the actual content container (max-width 1800px)
  const maxW  = Math.min(W, 1800);
  const left0 = (W - maxW) / 2;
  const right = left0 + maxW * 0.63;
  const mid   = H * 0.50;

  // scale with viewport
  const S = Math.min(W, H) * 0.085;

  return [
    // ── Large main molecule ──
    // ox/oy = layout plane offset, oz = depth offset (gives true 3D volume)
    {
      ax: right, ay: mid,
      scale: 1.0,
      floatAmp: S * 0.10, floatFreq: 0.38, floatPhase: 0.0,
      rotSpeedY: 0.22,   // yaw (left-right tumble)
      rotSpeedX: 0.09,   // pitch (up-down tilt)
      mouseW: 0.06,
      nodes: [
        { ox:  0,      oy:  0,      oz:  S*0.30, r: S*0.28, col:'#c8f0e8', type:'center' },
        { ox: -S*0.75, oy: -S*0.55, oz: -S*0.20, r: S*0.18, col:'#e8f8f4', type:'mid' },
        { ox:  S*0.75, oy: -S*0.55, oz:  S*0.20, r: S*0.18, col:'#e8f8f4', type:'mid' },
        { ox: -S*0.75, oy:  S*0.55, oz:  S*0.20, r: S*0.18, col:'#a0ddd0', type:'mid' },
        { ox:  S*0.75, oy:  S*0.55, oz: -S*0.20, r: S*0.18, col:'#a0ddd0', type:'mid' },
        { ox:  0,      oy: -S*1.05, oz:  0,       r: S*0.13, col:'#c8f0e8', type:'outer' },
        { ox:  0,      oy:  S*1.05, oz:  0,       r: S*0.13, col:'#c8f0e8', type:'outer' },
        { ox: -S*1.28, oy:  0,      oz: -S*0.10,  r: S*0.11, col:'#e8f8f4', type:'outer' },
        { ox:  S*1.28, oy:  0,      oz:  S*0.10,  r: S*0.11, col:'#e8f8f4', type:'outer' },
      ],
      bonds: [[0,1],[0,2],[0,3],[0,4],[1,5],[2,5],[3,6],[4,6],[1,7],[3,7],[2,8],[4,8]],
    },
    // ── Upper-left satellite ──
    {
      ax: right - S*2.4, ay: mid - S*2.2,
      scale: 0.72,
      floatAmp: S*0.14, floatFreq: 0.52, floatPhase: 1.2,
      rotSpeedY: 0.31,
      rotSpeedX: 0.12,
      mouseW: 0.045,
      nodes: [
        { ox:  0,      oy:  0,      oz:  S*0.22, r: S*0.20, col:'#c8f0e8', type:'center' },
        { ox: -S*0.60, oy: -S*0.45, oz: -S*0.15, r: S*0.13, col:'#e8f8f4', type:'mid' },
        { ox:  S*0.60, oy: -S*0.45, oz:  S*0.15, r: S*0.13, col:'#e8f8f4', type:'mid' },
        { ox:  0,      oy:  S*0.65, oz:  S*0.10, r: S*0.13, col:'#a0ddd0', type:'mid' },
        { ox: -S*0.95, oy:  0,      oz:  0,      r: S*0.09, col:'#c8f0e8', type:'outer' },
        { ox:  S*0.95, oy:  0,      oz:  0,      r: S*0.09, col:'#c8f0e8', type:'outer' },
      ],
      bonds: [[0,1],[0,2],[0,3],[1,4],[2,5]],
    },
    // ── Lower-right satellite ──
    {
      ax: right + S*1.6, ay: mid + S*2.0,
      scale: 0.60,
      floatAmp: S*0.16, floatFreq: 0.65, floatPhase: 2.5,
      rotSpeedY: 0.40,
      rotSpeedX: 0.08,
      mouseW: 0.03,
      nodes: [
        { ox:  0,      oy:  0,      oz:  S*0.18, r: S*0.17, col:'#c8f0e8', type:'center' },
        { ox: -S*0.52, oy: -S*0.38, oz: -S*0.12, r: S*0.11, col:'#e8f8f4', type:'mid' },
        { ox:  S*0.52, oy: -S*0.38, oz:  S*0.12, r: S*0.11, col:'#e8f8f4', type:'mid' },
        { ox:  0,      oy:  S*0.55, oz:  0,      r: S*0.11, col:'#a0ddd0', type:'mid' },
      ],
      bonds: [[0,1],[0,2],[0,3]],
    },
    // ── Top-right tiny ──
    {
      ax: right + S*2.0, ay: mid - S*2.8,
      scale: 0.48,
      floatAmp: S*0.18, floatFreq: 0.45, floatPhase: 4.1,
      rotSpeedY: 0.28,
      rotSpeedX: 0.14,
      mouseW: 0.02,
      nodes: [
        { ox:  0,     oy:  0,      oz:  S*0.14, r: S*0.14, col:'#c8f0e8', type:'center' },
        { ox: -S*0.45,oy: -S*0.35, oz: -S*0.10, r: S*0.09, col:'#e8f8f4', type:'outer' },
        { ox:  S*0.45,oy: -S*0.35, oz:  S*0.10, r: S*0.09, col:'#e8f8f4', type:'outer' },
        { ox:  0,     oy:  S*0.50, oz:  0,      r: S*0.09, col:'#a0ddd0', type:'outer' },
      ],
      bonds: [[0,1],[0,2],[0,3]],
    },
  ];
}

// ── Node world positions (with rotation applied) ──────────
function getNodePositions(mol, rotAngle) {
  const cos = Math.cos(rotAngle), sin = Math.sin(rotAngle);
  return mol.nodes.map(n => ({
    x: mol.ax + n.ox * cos - n.oy * sin,
    y: mol.ay + n.ox * sin + n.oy * cos,
    r: n.r,
    col: n.col,
  }));
}

// ── Build particles (run after first resize so W/H valid) ──
const PARTICLE_COUNT = 420;
let particles = [];

function buildParticles(molecules) {
  // Collect all node world positions (at rotation=0)
  const allNodes = [];
  molecules.forEach(mol => {
    mol.nodes.forEach(n => {
      allNodes.push({
        x: mol.ax + n.ox, y: mol.ay + n.oy,
        r: n.r, col: n.col,
      });
    });
  });

  const cols = ['#c8f0e8','#e8f8f4','#a0ddd0','#d4f4ee','#f0faf8'];

  particles = Array.from({ length: PARTICLE_COUNT }, (_, i) => {
    // spawn from random edge
    const side = Math.floor(Math.random() * 4);
    let sx, sy;
    if      (side===0) { sx = Math.random()*W;  sy = -20; }
    else if (side===1) { sx = W+20;              sy = Math.random()*H; }
    else if (side===2) { sx = Math.random()*W;  sy = H+20; }
    else               { sx = -20;               sy = Math.random()*H; }

    const node = allNodes[i % allNodes.length];
    // small spread so particles don't all land on same pixel
    const spread = node.r * 0.9;
    const angle  = Math.random() * Math.PI * 2;
    const dist   = Math.random() * spread;

    return {
      sx, sy,
      x: sx, y: sy,
      // final resting position = node centre + tiny spread
      tx: node.x + Math.cos(angle)*dist,
      ty: node.y + Math.sin(angle)*dist,
      nodeX: node.x,
      nodeY: node.y,
      nodeR: node.r,
      nodeCol: node.col,
      delay:  Math.random() * 0.38,
      size:   1.0 + Math.random() * 1.8,
      col:    cols[Math.floor(Math.random()*cols.length)],
    };
  });
}

// ── Phase timing ─────────────────────────────────────────
const T_GATHER   = 1.7;   // particles fly in
const T_CONDENSE = 0.9;   // particles swell into spheres
const T_XFADE    = 0.6;   // crossfade: particles↓  live↑  (overlap window)

// ── Live state ───────────────────────────────────────────
let liveRotY  = [];   // yaw angle per molecule
let liveRotX  = [];   // pitch angle per molecule
let liveFloat = [];
let startTime = null;

function draw(ts) {
  requestAnimationFrame(draw);
  if (!startTime) startTime = ts;
  const elapsed = (ts - startTime) / 1000;

  ctx.clearRect(0, 0, W, H);

  mouse.sx += (mouse.nx - mouse.sx) * 0.05;
  mouse.sy += (mouse.ny - mouse.sy) * 0.05;

  const molecules = getMolecules();

  if (liveRotY.length !== molecules.length) {
    liveRotY  = molecules.map(() => 0);
    liveRotX  = molecules.map(() => 0);
    liveFloat = molecules.map(() => 0);
  }

  const gatherT   = Math.min(elapsed / T_GATHER, 1);
  const condenseT = elapsed > T_GATHER
    ? Math.min((elapsed - T_GATHER) / T_CONDENSE, 1) : 0;

  // xfadeT: 0 → 1 over T_XFADE window that starts at condense end
  const xfadeStart = T_GATHER + T_CONDENSE;
  const xfadeT = elapsed > xfadeStart
    ? Math.min((elapsed - xfadeStart) / T_XFADE, 1) : 0;

  // particleAlpha fades OUT as xfade progresses
  const particleLayerAlpha = 1 - easeInOutCubic(xfadeT);
  // liveAlpha fades IN over same window
  const liveLayerAlpha = easeInOutCubic(xfadeT);

  // rotation and float only tick after crossfade is fully done
  const rotStart    = xfadeStart + T_XFADE;
  const liveElapsed = Math.max(0, elapsed - rotStart);
  molecules.forEach((mol, mi) => {
    if (xfadeT >= 1) {
      liveRotY[mi] += mol.rotSpeedY * 0.008;
      liveRotX[mi] += mol.rotSpeedX * 0.006;
      // float starts from 0 and eases in over first 1.5s so anchor matches exactly at handoff
      const floatEase = Math.min(liveElapsed / 1.5, 1);
      liveFloat[mi] = Math.sin(liveElapsed * mol.floatFreq + mol.floatPhase) * mol.floatAmp * floatEase;
    } else {
      liveFloat[mi] = 0;
    }
  });

  // ─────────────────────────────────────────────────────
  //  PHASE 1 + 2: particles (fades out via particleLayerAlpha)
  // ─────────────────────────────────────────────────────
  if (particleLayerAlpha > 0) {
    particles.forEach(p => {
      const g = easeInOutCubic(Math.min(Math.max((gatherT - p.delay) / (1 - p.delay*0.5), 0), 1));
      p.x = lerp(p.sx, p.tx, g);
      p.y = lerp(p.sy, p.ty, g);

      const c  = easeOutCubic(condenseT);
      const px = lerp(p.x, p.nodeX, c);
      const py = lerp(p.y, p.nodeY, c);

      const drawR = lerp(p.size, p.nodeR, easeOutExpo(condenseT));
      const baseAlpha = lerp(0.25 + g*0.65, 1.0, c);
      const alpha = baseAlpha * particleLayerAlpha;

      // trail while flying
      if (g > 0.02 && g < 0.97 && condenseT === 0) {
        const tx2 = lerp(p.sx, p.tx, Math.max(0, g - 0.06));
        const ty2 = lerp(p.sy, p.ty, Math.max(0, g - 0.06));
        const grad = ctx.createLinearGradient(tx2, ty2, p.x, p.y);
        grad.addColorStop(0, p.col+'00');
        grad.addColorStop(1, p.col+'44');
        ctx.beginPath(); ctx.moveTo(tx2, ty2); ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = grad; ctx.lineWidth = p.size*0.5;
        ctx.globalAlpha = 0.5 * particleLayerAlpha; ctx.stroke();
      }

      ctx.beginPath(); ctx.arc(px, py, Math.max(0.5, drawR), 0, Math.PI*2);
      ctx.fillStyle = condenseT > 0.05 ? p.nodeCol : p.col;
      ctx.globalAlpha = alpha; ctx.fill(); ctx.globalAlpha = 1;
    });
  }

  // ─────────────────────────────────────────────────────
  //  PHASE 3: live molecule (fades in via liveLayerAlpha)
  //  Rotation starts at 0 so spheres sit exactly on top of
  //  the condensed particle positions — invisible seam.
  // ─────────────────────────────────────────────────────
  if (liveLayerAlpha > 0) {
    const liveAlpha = liveLayerAlpha;

    molecules.forEach((mol, mi) => {
      const ry = liveRotY[mi];
      const rx = liveRotX[mi];

      // mouse/float influence eases in only after xfade is done
      const influence = xfadeT >= 1 ? Math.min(liveElapsed / 1.2, 1) : 0;
      const floatY = liveFloat[mi] * influence + mouse.sy * mol.floatAmp * 0.5 * influence;
      const mouseX = mouse.sx * mol.mouseW * W * 0.04 * influence;

      const ax = mol.ax + mouseX;
      const ay = mol.ay + floatY;

      // Full 3D rotation: Y-axis yaw then X-axis pitch
      const cosY = Math.cos(ry), sinY = Math.sin(ry);
      const cosX = Math.cos(rx), sinX = Math.sin(rx);

      // Depth range for normalising (used for size/shade scale)
      const maxR = mol.nodes[0].r * 10;

      const nodePos = mol.nodes.map(n => {
        // Y-axis rotation: ox/oz plane
        const rx1 =  n.ox * cosY + n.oz * sinY;
        const rz1 = -n.ox * sinY + n.oz * cosY;
        // X-axis rotation: oy/rz1 plane
        const ry2 =  n.oy * cosX - rz1 * sinX;
        const rz2 =  n.oy * sinX + rz1 * cosX;
        return {
          x: ax + rx1,
          y: ay + ry2,
          z: rz2,          // positive = toward viewer
          r: n.r, col: n.col, type: n.type,
        };
      });

      // ── Bonds (back to front by avg z) ──
      const bondsSorted = mol.bonds.map(([ai, bi]) => ({
        ai, bi, avgZ: (nodePos[ai].z + nodePos[bi].z) * 0.5,
      }));
      bondsSorted.sort((a, b) => a.avgZ - b.avgZ);

      bondsSorted.forEach(({ ai, bi }) => {
        const a = nodePos[ai], b = nodePos[bi];
        const za = (a.z + maxR) / (maxR * 2);
        const zb = (b.z + maxR) / (maxR * 2);
        const wA = mol.nodes[ai].r * (0.12 + za * 0.10);
        const wB = mol.nodes[bi].r * (0.12 + zb * 0.10);
        const bw = (wA + wB) * 0.5;
        const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
        const aOpacity = Math.round((0.3 + za * 0.45) * 255).toString(16).padStart(2,'0');
        const bOpacity = Math.round((0.3 + zb * 0.45) * 255).toString(16).padStart(2,'0');
        grad.addColorStop(0, a.col + aOpacity);
        grad.addColorStop(1, b.col + bOpacity);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth   = bw;
        ctx.globalAlpha = liveAlpha;
        ctx.stroke();
      });

      // ── Nodes (back to front by z) ──
      const sorted = nodePos.map((np, i) => ({ np, n: mol.nodes[i] }));
      sorted.sort((a, b) => a.np.z - b.np.z);

      sorted.forEach(({ np, n }) => {
        // z in [-maxR, +maxR], normalise to [0,1]
        const zNorm  = (np.z + maxR) / (maxR * 2);
        // depth scale eases in after xfade so size at handoff = 1.0 (matches particle)
        const depthScale = xfadeT >= 1 ? Math.min(liveElapsed / 1.2, 1) : 0;
        const depthS = 1.0 + (0.28 * zNorm - 0.14) * depthScale; // 1.0 → 0.72–1.28
        const drawR  = np.r * depthS;

        // Specular highlight offset toward top-left (light source)
        const hiX = np.x - drawR * 0.36;
        const hiY = np.y - drawR * 0.36;

        const darkCol = np.type==='center' ? '#0a2018' : np.type==='mid' ? '#0d2a20' : '#112e24';

        const sphGrd = ctx.createRadialGradient(hiX, hiY, drawR * 0.02, np.x, np.y, drawR);
        sphGrd.addColorStop(0,    '#ffffffee');   // bright specular cap
        sphGrd.addColorStop(0.08, '#ffffffaa');
        sphGrd.addColorStop(0.28, np.col);        // base colour
        sphGrd.addColorStop(0.72, np.col + 'dd');
        sphGrd.addColorStop(1,    darkCol);        // dark limb — sells the sphere

        ctx.beginPath(); ctx.arc(np.x, np.y, drawR, 0, Math.PI*2);
        ctx.fillStyle = sphGrd; ctx.globalAlpha = liveAlpha; ctx.fill();
        ctx.globalAlpha = 1;
      });
    });
  }
}

// Start after layout is painted so W/H is correct
requestAnimationFrame(() => {
  resize();
  buildParticles(getMolecules());
  requestAnimationFrame(draw);
});

// ── Text reveal orchestration ─────────────────────────────
// Staggered sequence: label → title lines → divider → sub → cta → stats
// Delays tuned so text lands as particles are still flying in (feels connected)
function revealText() {
  const delay = (el, ms, fn) => setTimeout(() => { if (el) fn(el); }, ms);

  const label    = document.querySelector('.hero-label');
  const lines    = document.querySelectorAll('.reveal-block');
  const divider  = document.querySelector('.hero-divider');
  const sub      = document.querySelector('.hero-sub');
  const cta      = document.querySelector('.hero-cta');
  const stats    = document.querySelector('.hero-stats');

  // label fades up first
  delay(label, 120, el => el.classList.add('revealed'));

  // title lines slide up with stagger
  lines.forEach((line, i) => {
    delay(line, 320 + i * 140, el => el.classList.add('revealed'));
  });

  // divider draws after last title line
  delay(divider, 320 + lines.length * 140 + 60, el => el.classList.add('revealed'));

  // sub text
  delay(sub, 820, el => el.classList.add('revealed'));

  // cta buttons
  delay(cta, 1020, el => el.classList.add('revealed'));

  // stats with count-up
  delay(stats, 1200, el => {
    el.classList.add('revealed');
    el.querySelectorAll('.stat-num[data-target]').forEach((num, i) => {
      setTimeout(() => countUp(num), i * 120);
    });
  });
}

function countUp(el) {
  const target = parseInt(el.dataset.target, 10);
  const suffix = el.dataset.suffix || '';
  if (target === 0) { el.textContent = '0' + suffix; return; }
  const duration = 900;
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    // ease out expo
    const eased = t >= 1 ? 1 : 1 - Math.pow(2, -10 * t);
    el.textContent = Math.round(eased * target) + suffix;
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Start text reveal shortly after page load
// (particles start flying at t=0; text appears during the flight)
setTimeout(revealText, 80);
</script>
